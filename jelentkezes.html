    <div id="leaflet-js-map" style="height: 400px;"></div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script>
             {
            const map = L.map('leaflet-js-map').setView([47.497197, 19.051991], 11.5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                minZoom: 0,
                maxZoom: 20
            }).addTo(map);
            const leafletMarkers = L.layerGroup([
                new L.marker([47.469247, 19.113779]),
                new L.marker([47.504182, 19.117937]),
                new L.marker([47.536742, 19.073105])
            ]);
            leafletMarkers.addTo(map);
        }
        </script>
